<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bucket List</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🎯 My Bucket List</h1>
            <p class="text-white opacity-90">Track your life goals and dreams</p>
        </header>

        <!-- Statistics -->
        <div class="p-6 mb-6">
            <div class="flex justify-around text-center">
                <div>
                    <p class="text-3xl font-bold text-blue-300" id="totalCount">0</p>
                    <p class="text-white text-sm opacity-75">Total</p>
                </div>
                <div>
                    <p class="text-3xl font-bold text-green-300" id="completedCount">0</p>
                    <p class="text-white text-sm opacity-75">Completed</p>
                </div>
                <div>
                    <p class="text-3xl font-bold text-orange-300" id="progressCount">0</p>
                    <p class="text-white text-sm opacity-75">In Progress</p>
                </div>
                <div>
                    <p class="text-3xl font-bold text-purple-300" id="completionRate">0%</p>
                    <p class="text-white text-sm opacity-75">Completion Rate</p>
                </div>
            </div>
        </div>

        <!-- Input Form -->
        <div class="p-6 mb-6">
            <form id="bucketForm" class="flex gap-2">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="Add a new goal..."
                    class="flex-1 px-4 py-3 border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white/10 text-white placeholder-white/50"
                    required
                >
                <button
                    type="submit"
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                >
                    Add
                </button>
            </form>
        </div>

        <!-- Filters -->
        <div class="p-4 mb-6">
            <div class="flex gap-2 justify-center">
                <button
                    class="filter-btn px-6 py-2 rounded-lg font-medium transition-colors active"
                    data-filter="all"
                >
                    All
                </button>
                <button
                    class="filter-btn px-6 py-2 rounded-lg font-medium transition-colors"
                    data-filter="active"
                >
                    In Progress
                </button>
                <button
                    class="filter-btn px-6 py-2 rounded-lg font-medium transition-colors"
                    data-filter="completed"
                >
                    Completed
                </button>
            </div>
        </div>

        <!-- Bucket List Items -->
        <div id="bucketListContainer" class="space-y-3">
            <!-- Dynamically generated -->
        </div>

        <!-- Empty State Message -->
        <div id="emptyState" class="text-center py-12 hidden">
            <p class="text-white/60 text-lg">No goals yet.</p>
            <p class="text-white/60">Add a new goal above to get started!</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="rounded-lg p-6 max-w-md w-full mx-4 bg-gradient-to-br from-gray-800 to-gray-900">
            <h3 class="text-xl font-bold mb-4 text-white">Edit Goal</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-4 py-3 border border-white/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4 bg-white/10 text-white"
                    required
                >
                <div class="flex gap-2 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors"
                    >
                        Cancel
                    </button>
                    <button
                        type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                    >
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
